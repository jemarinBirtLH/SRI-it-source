            // --------------------------------------------------------------
            // RENDERIZADO Y ESTADO
            // --------------------------------------------------------------
            const container = document.getElementById('mindmap-container');
            const nodePathDiv = document.getElementById('nodePath');
            const nodeContentDiv = document.getElementById('nodeContent');
            let selectedNodeId = null;

            // Mapa de nodos por ID para búsquedas
            const nodeMap = new Map();

            function buildNodeMap(node, parentPath = '') {
                const path = parentPath ? parentPath + ' → ' + node.text : node.text;
                node.path = path;
                nodeMap.set(node.id, node);
                if (node.children) {
                    node.children.forEach(child => buildNodeMap(child, path));
                }
            }
            buildNodeMap(mapData);

            // Determinar clase de color de fondo según bgColor (si está definido)
            function getBgClass(node) {
                if (!node.bgColor) return '';
                if (node.bgColor === '#ffff99') return 'bg-soft-yellow';
                if (node.bgColor === '#99ccff') return 'bg-soft-blue';
                if (node.bgColor === '#ff9999') return 'bg-soft-red';
                if (node.bgColor === '#99ff99') return 'bg-soft-green';
                if (node.bgColor === '#ffcc99') return 'bg-soft-orange';
                if (node.bgColor === '#ccffcc') return 'bg-soft-green';
                if (node.bgColor === '#ccff99') return 'bg-soft-green';
                if (node.bgColor === '#00ff00') return 'bg-soft-green';
                if (node.bgColor === '#ff9900') return 'bg-soft-orange';
                if (node.bgColor === '#cccccc') return 'bg-soft-purple';
                return '';
            }

            // Render recursivo (con manejo de nodos especiales intro/summary)
            function renderNode(node, isRoot = false) {
                if (node.isIntro || node.isSummary) {
                    // nodo especial de texto grande
                    const wrapper = document.createElement('div');
                    wrapper.className = node.isIntro ? 'intro-node' : 'summary-node';
                    wrapper.dataset.nodeId = node.id;
                    const h2 = document.createElement('h2');
                    h2.textContent = node.text;
                    wrapper.appendChild(h2);
                    const para = document.createElement('div');
                    para.style.whiteSpace = 'pre-line';
                    para.textContent = node.content;
                    wrapper.appendChild(para);
                    wrapper.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectedNodeId = node.id;
                        nodePathDiv.innerText = '🔖 ' + (node.path || node.text);
                        nodeContentDiv.innerText = node.content || node.text;
                        refreshView();
                    });
                    return wrapper;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'node-wrapper';
                wrapper.dataset.nodeId = node.id;

                const row = document.createElement('div');
                row.className = 'node-row';

                const elem = document.createElement('div');
                elem.className = 'node-element' + (selectedNodeId === node.id ? ' selected' : '') + (getBgClass(node) ? ' ' + getBgClass(node) : '');
                if (node.fgColor) elem.style.color = node.fgColor;
                elem.setAttribute('data-id', node.id);
                elem.setAttribute('title', 'Clic para ver detalles');

                // texto
                const textSpan = document.createElement('span');
                textSpan.textContent = node.text;
                if (node.hasCheckbox) {
                    const check = document.createElement('span');
                    check.className = 'check-item';
                    check.textContent = ' ☐';
                    check.addEventListener('click', (e) => {
                        e.stopPropagation();
                        check.textContent = check.textContent === ' ☐' ? ' ☑' : ' ☐';
                    });
                    textSpan.appendChild(check);
                }
                elem.appendChild(textSpan);

                // expander si tiene hijos
                if (node.children && node.children.length > 0) {
                    const exp = document.createElement('span');
                    exp.className = 'expander';
                    exp.textContent = node.folded ? ' [+]' : ' [–]';
                    exp.addEventListener('click', (e) => {
                        e.stopPropagation();
                        node.folded = !node.folded;
                        refreshView();
                    });
                    elem.appendChild(exp);
                }

                elem.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedNodeId = node.id;
                    nodePathDiv.innerText = '🔖 ' + (node.path || node.text);
                    nodeContentDiv.innerText = node.content || node.text;
                    refreshView();
                });

                row.appendChild(elem);
                wrapper.appendChild(row);

                // hijos si no está folded
                if (node.children && node.children.length > 0 && !node.folded) {
                    const childrenContainer = document.createElement('div');
                    childrenContainer.className = 'children-container';
                    node.children.forEach(child => {
                        const col = document.createElement('div');
                        col.className = 'child-column';
                        col.appendChild(renderNode(child));
                        childrenContainer.appendChild(col);
                    });
                    wrapper.appendChild(childrenContainer);
                }

                return wrapper;
            }

            function refreshView() {
                container.innerHTML = '';
                const rootElem = renderNode(mapData, true);
                container.appendChild(rootElem);
                // restaurar selección si existe
                if (selectedNodeId) {
                    const selected = nodeMap.get(selectedNodeId);
                    if (selected) {
                        nodePathDiv.innerText = '🔖 ' + (selected.path || selected.text);
                        nodeContentDiv.innerText = selected.content || selected.text;
                    }
                }
            }

            // Expandir / colapsar todo
            function setAllFolded(node, folded) {
                if (!node.isIntro && !node.isSummary) node.folded = folded;
                if (node.children) {
                    node.children.forEach(child => setAllFolded(child, folded));
                }
            }

            document.getElementById('expandAllBtn').addEventListener('click', () => {
                setAllFolded(mapData, false);
                refreshView();
            });

            document.getElementById('collapseAllBtn').addEventListener('click', () => {
                setAllFolded(mapData, true);
                refreshView();
            });

            document.getElementById('resetViewBtn').addEventListener('click', () => {
                // restaurar plegados originales (todo true, raíz false, intro y summary false)
                mapData.folded = false;
                function resetFolded(node) {
                    if (node.isIntro || node.isSummary) {
                        node.folded = false;
                    } else if (node.children) {
                        node.children.forEach(resetFolded);
                    }
                    if (node.id !== 'ID_0' && !node.isIntro && !node.isSummary) node.folded = true;
                }
                resetFolded(mapData);
                selectedNodeId = null;
                nodePathDiv.innerText = '🔖 Ninguno seleccionado';
                nodeContentDiv.innerText = '—';
                refreshView();
            });

            // búsqueda simple (primer nodo que contenga texto)
            document.getElementById('searchBtn').addEventListener('click', () => {
                const query = document.getElementById('searchInput').value.toLowerCase();
                if (!query) return;
                let found = null;
                for (let [id, nd] of nodeMap.entries()) {
                    if (nd.text.toLowerCase().includes(query) || (nd.content && nd.content.toLowerCase().includes(query))) {
                        found = nd;
                        break;
                    }
                }
                if (found) {
                    setAllFolded(mapData, false); // expandir todo para poder verlo
                    refreshView();
                    selectedNodeId = found.id;
                    nodePathDiv.innerText = '🔖 ' + (found.path || found.text);
                    nodeContentDiv.innerText = found.content || found.text;
                    refreshView();
                    // desplazamiento suave
                    setTimeout(() => {
                        const el = document.querySelector(`[data-node-id="${found.id}"]`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                } else {
                    alert('Nodo no encontrado');
                }
            });

            // doble clic en texto copia (delegación)
            container.addEventListener('dblclick', (e) => {
                const nodeElem = e.target.closest('.node-element');
                if (nodeElem) {
                    const text = nodeElem.innerText.replace(/\[[+–-]\]/g,'').replace(/[☐☑]/g,'').trim();
                    navigator.clipboard?.writeText(text).then(() => {
                        nodeElem.style.transition = '0.1s';
                        nodeElem.style.backgroundColor = '#d9f99d';
                        setTimeout(() => { nodeElem.style.backgroundColor = ''; }, 150);
                    }).catch(() => alert('No se pudo copiar'));
                } else {
                    // quizás intro/summary
                    const introSum = e.target.closest('.intro-node, .summary-node');
                    if (introSum) {
                        const text = introSum.innerText;
                        navigator.clipboard?.writeText(text).catch(() => {});
                    }
                }
            });

            // --------------------------------------------------------------
            // ANIMACIÓN DE LETRAS FLOTANTES (made by jemarin)
            // --------------------------------------------------------------
            function startFloatingLetters() {
                const container = document.getElementById('floatingLettersContainer');
                const text = 'made by jemarin';
                const colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff', '#ff00aa'];
                const totalLetters = text.length;
                const duration = 30 * 1000; // 30 segundos
                const interval = 300; // crear una letra cada 300ms
                const startTime = Date.now();

                function createLetter(index) {
                    if (Date.now() - startTime > duration) return;
                    const letter = text[index % totalLetters];
                    const span = document.createElement('span');
                    span.className = 'floating-letter';
                    span.textContent = letter;
                    span.style.left = Math.random() * 100 + '%';
                    span.style.top = Math.random() * 100 + '%';
                    span.style.color = colors[Math.floor(Math.random() * colors.length)];
                    const dx = (Math.random() - 0.5) * 400 + 'px';
                    const dy = (Math.random() - 0.5) * 400 + 'px';
                    const r = (Math.random() - 0.5) * 720 + 'deg';
                    span.style.setProperty('--dx', dx);
                    span.style.setProperty('--dy', dy);
                    span.style.setProperty('--r', r);
                    container.appendChild(span);
                    setTimeout(() => { if (span.parentNode) span.remove(); }, 2800);
                }

                let count = 0;
                const timer = setInterval(() => {
                    if (Date.now() - startTime > duration) {
                        clearInterval(timer);
                        return;
                    }
                    createLetter(count++);
                }, interval);

                // también crear algunas al inicio rápidas
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => createLetter(count++), i * 50);
                }
            }

            window.addEventListener('load', startFloatingLetters);

            // inicial
            refreshView();
        })();
    </script>
</body>
</html>
